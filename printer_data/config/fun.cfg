# Heated Bed  
[heater_bed]
# connected to MCU XYZE - HEATED BED OUTPUT
heater_pin: PA0
# NTC 100K MGB18-104F39050L32 is for Kenovo thermistors
sensor_type: NTC 100K MGB18-104F39050L32
# connected to MCU XYZE - TB Thermistor
sensor_pin: PF3
smooth_time: 3.0

#Build Plate PID Settings
max_power: 1
min_temp: 0
max_temp: 130

[heater_fan hotend_fan]
#! FAN2 Connector (Hotend Fan)
pin: ebb36:PA1
max_power: 1.0
heater: extruder
heater_temp: 50.0
## If you are experiencing back flow, you can reduce fan_speed
fan_speed: 1.0
shutdown_speed: 1.0

[temperature_fan chamber]
pin: PD15
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
cycle_time:0.01
off_below:0.1
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: ebb36:PA3
min_temp: 0
max_temp: 80
target_temp: 35.0
control: watermark
gcode_id: C
max_delta: 1.0

[gcode_macro M141]
default_parameter_S: 0
default_parameter_P: 0
gcode:
    SET_TEMPERATURE_FAN_TARGET temperature_fan="chamber" target={S}

[gcode_macro _CHAMBER_ON]
description: Helper: filter on
gcode: SET_FAN_SPEED FAN=Chamber SPEED=0.5

[gcode_macro  _CHAMBER_OFF]
description: Helper: filter of
gcode: SET_FAN_SPEED FAN=Chamber SPEED=0

[fan_generic filter]
pin: PD14
max_power: 1.0
hardware_pwm: True
cycle_time: 0.00001
kick_start_time: 0.5
off_below: 0.10

[gcode_macro FILTER_ON]
description: Helper: filter on
gcode: SET_FAN_SPEED FAN=filter SPEED=1.0

[gcode_macro FILTER_OFF]
description: Helper: filter of
gcode: SET_FAN_SPEED FAN=filter SPEED=0

[controller_fan mcu_fun]
#! In HE1 Position (Electronics fan)
# You can place both wires into a single ferrule
pin: PD13
shutdown_speed: 1.0
kick_start_time: 1.0
off_below: 0.15
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2, stepper_z3

[temperature_fan Electronics]
#! In HE1 Position (Electronics fan)
# You can place both wires into a single ferrule
pin: PA8
max_power: 1.0
cycle_time: 0.00001
hardware_pwm: True
shutdown_speed: 0
kick_start_time: 0.1
off_below: 0.15
control: pid
pid_kp = 0.5
pid_ki = 1
pid_kd = 0.5
min_temp: 0
max_temp: 90
#max_delta: 3
target_temp: 50
sensor_type: temperature_host